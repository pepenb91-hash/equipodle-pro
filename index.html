<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipodle Pro - Las 5 Grandes Ligas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Barra superior con info, stats, racha e idioma -->
    <div id="top-bar">
        <button id="info-btn" title="Cómo jugar">ℹ️</button>
        <button id="stats-btn" title="Estadísticas">📊</button>

        <!-- Cápsula de racha -->
        <div id="streak-capsule" title="Racha de victorias">
            <div id="streak-ball-wrapper">
                <div id="streak-aura"></div>
                <span id="streak-ball">🏐</span>
                <span id="streak-extra"></span>
            </div>
            <span id="streak-count">0</span>
        </div>

        <div id="lang-switcher">
            <button class="lang-btn active" data-lang="es" title="Español">🇪🇸</button>
            <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
        </div>
    </div>

    <div id="game-container">
        <h1>Equipodle <span style="font-size: 0.5em; color: #2ed573;">Pro</span></h1>

        <div id="attempts-counter">
            <div class="attempts-title" data-i18n="attemptsTitle">Número de intentos</div>
            <div id="attempts-number">0</div>
            <div id="attempts-balls"></div>
        </div>

        <div class="search-box">
            <input type="text" id="team-input" placeholder="Escribe el nombre de un equipo..." autocomplete="off">
            <div id="autocomplete-list" class="autocomplete-items"></div>
        </div>

        <div id="results-table">
            <div class="header-row hidden" id="header-row">
                <div class="team-info-placeholder"></div>
                <div class="cell-head" data-i18n="colLeague">Liga</div>
                <div class="cell-head" data-i18n="colTitles">Títulos</div>
                <div class="cell-head" data-i18n="colColor">Color</div>
                <div class="cell-head" data-i18n="colBudget">Presup.</div>
                <div class="cell-head" data-i18n="colYears">1ª Div</div>
                <div class="cell-head" data-i18n="colBrand">Marca</div>
                <div class="cell-head" data-i18n="colStadium">Estadio</div>
            </div>
            <div id="guesses-container"></div>
        </div>
    </div>

    <!-- Pantalla de victoria -->
    <div id="victory-overlay" class="hidden">
        <div id="victory-card">
            <div class="confetti-emoji">🏆</div>
            <h2 id="victory-heading" data-i18n="victoryTitle">¡Victoria!</h2>
            <p id="victory-message">
                <span data-i18n="victoryTextBefore">Has adivinado el equipo en</span>
                <span id="victory-attempts">0</span>
                <span data-i18n="victoryTextAfter">intentos</span>
            </p>
            <div id="victory-team">
                <img id="victory-team-logo" src="" alt="">
                <span id="victory-team-name"></span>
            </div>
            <div id="mini-stats"></div>
            <div id="countdown-box">
                <div class="countdown-label" data-i18n="nextGameIn">Próximo equipo en</div>
                <div id="countdown-timer">--:--:--</div>
            </div>
            <button id="view-stats-btn" data-i18n="statsTitle">Estadísticas</button>
        </div>
    </div>

    <!-- Modal de estadísticas -->
    <div id="stats-overlay" class="hidden">
        <div id="stats-card">
            <h2 data-i18n="statsTitle">Estadísticas</h2>
            <div id="stats-grid"></div>
            <button id="close-stats-btn" data-i18n="closeBtn">Cerrar</button>
        </div>
    </div>

    <!-- Modal de "Nuevo nivel" -->
    <div id="levelup-overlay" class="hidden">
        <div id="levelup-card">
            <div class="levelup-title" data-i18n="levelUpTitle">¡NUEVO NIVEL!</div>
            <div id="levelup-ball-wrapper">
                <div id="levelup-aura"></div>
                <span id="levelup-ball">⚽</span>
                <span id="levelup-extra"></span>
            </div>
            <div id="levelup-tier-name">Tier</div>
            <div id="levelup-streak-number">Racha: 0</div>
            <button id="levelup-close-btn" data-i18n="closeBtn">Cerrar</button>
        </div>
    </div>

    <!-- Modal "Cómo jugar" -->
    <div id="info-overlay" class="hidden">
        <div id="info-card">
            <h2 data-i18n="infoTitle">Cómo jugar</h2>
            <div id="info-content"></div>
            <button id="close-info-btn" data-i18n="closeBtn">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
